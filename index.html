<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>son of a pixel — Under Construction</title>
  <style>
    :root{
      --bg0:#0b0616;
      --bg1:#230a45;
      --ink:#ffffff;
      --vio:#a855f7;
      --vio2:#7c3aed;
      --pink:#ff4fd8;
      --cyan:#22d3ee;
      --shadow:rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      background:
        radial-gradient(1200px 600px at 50% 20%, rgba(168,85,247,.35), transparent 60%),
        radial-gradient(900px 500px at 20% 80%, rgba(34,211,238,.18), transparent 55%),
        linear-gradient(135deg, var(--bg0), var(--bg1));
      color:var(--ink);
      overflow:hidden;
    }

    .wrap{
      width:min(720px, 92vw);
      text-align:center;
      padding:32px 18px;
    }

    .logo-shell{
      width:168px;
      height:168px;
      margin:0 auto 18px;
      display:grid;
      place-items:center;
      filter: drop-shadow(0 14px 28px var(--shadow));
    }

    .spin{
      width:120px;
      height:120px;
      position:relative;
      transform-origin:60px 60px;
      animation: spin 6.2s linear infinite;
    }

    @keyframes spin{
      0%{ transform: rotate(0deg) scale(1); }
      60%{ transform: rotate(220deg) scale(1.02); }
      100%{ transform: rotate(360deg) scale(1); }
    }

    .screen{
      position:absolute;
      left:18px; top:18px;
      width:84px; height:84px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      border-radius:3px;
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,.14);
    }

    .bar{
      position:absolute;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.85));
      box-shadow: 0 0 0 2px rgba(124,58,237,.25);
      image-rendering: pixelated;
    }
    .bar.top{ left:8px; top:8px; width:104px; height:10px; background: linear-gradient(180deg,#f8fafc,#e9d5ff); }
    .bar.left{ left:8px; top:8px; width:10px; height:104px; background: linear-gradient(180deg,#f8fafc,#e9d5ff); }
    .bar.right{
      right:8px; top:8px;
      width:10px; height:104px;
      background: linear-gradient(180deg,#22d3ee,#93c5fd);
      box-shadow: 0 0 0 2px rgba(34,211,238,.18);
    }
    .bar.bottom{
      left:8px; bottom:8px; width:104px; height:10px;
      background: linear-gradient(180deg,#f9a8d4,#c4b5fd);
    }

    .cap{
      position:absolute;
      width:12px; height:12px;
      background: var(--vio);
      box-shadow:
        0 0 0 2px rgba(255,255,255,.2),
        inset 0 0 0 2px rgba(0,0,0,.08);
      border-radius:2px;
    }
    .cap.tl{ left:0; top:0; background: var(--pink); }
    .cap.tr{ right:0; top:0; background: var(--cyan); }
    .cap.bl{ left:0; bottom:0; background: var(--cyan); opacity:.9; }
    .cap.br{ right:0; bottom:0; background: var(--vio); opacity:.95; }

    .scanline{
      position:absolute; inset:0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.06) 0px,
          rgba(255,255,255,.02) 2px,
          rgba(0,0,0,0) 5px
        );
      opacity:.55;
      mix-blend-mode: screen;
      pointer-events:none;
      border-radius:4px;
    }

    .msg{
      font-size:clamp(18px, 3.4vw, 24px);
      letter-spacing:.2px;
      margin:6px 0 0;
    }
    .sub{
      margin:10px auto 0;
      max-width:52ch;
      color:rgba(255,255,255,.78);
      font-size:clamp(13px, 2.6vw, 15px);
      line-height:1.45;
      transition: opacity .18s ease;
    }

    .dots{
      margin-top:14px;
      display:flex;
      justify-content:center;
      gap:10px;
      align-items:center;
      color:rgba(255,255,255,.7);
      font-size:14px;
      user-select:none;
    }
    .dot{
      width:10px; height:10px;
      border-radius:2px;
      background: rgba(255,255,255,.22);
      box-shadow: 0 0 0 2px rgba(168,85,247,.18);
      animation: pop 1s ease-in-out infinite;
    }
    .dot:nth-child(2){ animation-delay:.14s; background: rgba(34,211,238,.22); box-shadow: 0 0 0 2px rgba(34,211,238,.16); }
    .dot:nth-child(3){ animation-delay:.28s; background: rgba(255,79,216,.2); box-shadow: 0 0 0 2px rgba(255,79,216,.14); }

    @keyframes pop{
      0%,100%{ transform: translateY(0); opacity:.65; }
      50%{ transform: translateY(-6px); opacity:1; }
    }

    .wrap, .spin { transform: translateZ(0); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo-shell" aria-hidden="true">
      <div class="spin">
        <div class="bar top"></div>
        <div class="bar left"></div>
        <div class="bar right"></div>
        <div class="bar bottom"></div>

        <div class="screen"></div>

        <div class="cap tl"></div>
        <div class="cap tr"></div>
        <div class="cap bl"></div>
        <div class="cap br"></div>

        <div class="scanline"></div>
      </div>
    </div>

    <div class="msg">son of a pixel</div>
    <div id="sub" class="sub">Under construction — we’re assembling pixels, tuning vibes, and loading the beat…</div>

    <div class="dots" aria-label="Loading">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </main>

  <script>
    const texts = [
      "Finishing up roguelike run",
      "Destroy all humans.. wait NO.. I MEANT THE VIDEO GAME!",
      "Hanging on a single thread...",
      "Burning in digihell...",
      "Level is just a number",
      "Working on bugfix patch final v3 final final this time it's def fixed",
      "Cleansing dirty code",
      "Unwinding headphone wires",
      "Hailing Pixelus Prime",
      "Detecting sneakyware",
      "Experiencing crashloop, pls wait",
      "We're a band",
      "Loading forever...",
      "Under construction, but nice to see you.",
      "Where do squirrels go during hurricanes?",
      "Did you pay for parking?",
      "This site is under construction. Go watch old-school AVGN.",
      "We're coding away at this, come back some other time.",
      "Gaming metal is a thing now, the world is healing..."
    ];

    const el = document.getElementById("sub");
    let i = 0;

    function pickRandom() {
      let j;
      do { j = Math.floor(Math.random() * texts.length); } while (j === i);
      i = j;
      return texts[i];
    }

    function setTextRandom() {
      el.style.opacity = "0";
      setTimeout(() => {
        el.textContent = pickRandom();
        el.style.opacity = "1";
      }, 160);
    }

    // start immediately, then rotate every ~2.2–3.2s (randomized interval)
    setTextRandom();
    function loop() {
      const next = 7500;
      setTimeout(() => { setTextRandom(); loop(); }, next);
    }
    loop();
  </script>
</body>
</html>
